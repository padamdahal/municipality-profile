	<script type="text/javascript">
		$(document).ready(function(){
      $("#nav").load('./menu.html');
      $('#dataItems2').select2();
      $(".dataItems").hide();
			var base = "https://hmis.gov.np/"; //hmisrest/dhpbridge.php?action=";
			var basePlain = "https://hmis.gov.np/"; //hmisrest/dhpbridge.php?type=plain&action=";
			var dataElements = [];
			var dataElementNames = [];

			$.getJSON("/hmis/api/me.json?fields=id,name,displayName,organisationUnits[id,name]", function(userOus){
				$.each(userOus.organisationUnits, function(i, ou){
					var ouOptions = "<option value='"+ou.id+"'>"+ou.name+"</option>";
					$("#organisationUnit").append(ouOptions);
				});
			});

			$.getJSON(base+"hmis/api/dataElementGroups.json?paging=false", function(deGroups){
				$.each(deGroups.dataElementGroups, function(i, deGroup){
					var deGroupOption = "<option value='"+deGroup.id+"'>"+deGroup.displayName+"</option>";
					$("#program").append(deGroupOption);
				});
			});

			if($("#type").val() != "monitoring"){
					$(".dataItems").hide();
			}else{
				$(".dataItems").show();
			}

			$("#indicator-div").html("<h5>&laquo; Select options and click apply button</h5>");
			
			$(".form-select").change(function(){
				var id = $(this).attr("id");

				var program = $("#program").val();

				// Get the data elements by program
				var url = "hmis/api/dataElementGroups/"+program+".json?fields=dataElements[id,name]";
				$.getJSON(base+url, function(result){
					dataElements = [];
					dataElementNames = [];
					$.each(result.dataElements, function(i, de){
						dataElements.push(de.id);
						dataElementNames.push(de.id+"_"+de.name);
					});

					if(id == "program"){
						var optionHtml = "";
						$.each(dataElementNames, function(i, de){
							optionHtml += "<option value='"+de.split("_")[0]+"' title='"+de.split("_")[1]+"'>"+de.split("_")[1]+"</option>";
						});
						$("#dataItems2").html(optionHtml);
					}
					
					if($("#type").val() != "monitoring"){
						$(".dataItems").hide();
					}else{
						$(".dataItems").show();
					}

				});
			});
			
			$("#apply").click(function(){
				$("#indicator-div").show().html("Loading...");
				var reportType = $("#type").val();
				var period = $("#period").val();
				var program = $("#program").val();
				var ou = $("#organisationUnit").val();
        loadDataVerificationTable(period,ou);
        
			});
			
			function loadDataVerificationTable(period,ou){
				var dataUrl = "hmis/api/analytics.html+css?filter=pe:"+period+"&dimension=dx:";
				dataUrl += dataElements.join(";");
				dataUrl += "&dimension=ou:LEVEL-1;LEVEL-3;LEVEL-4;LEVEL-2;"+ou+"&displayProperty=NAME&tableLayout=true&columns=dx&rows=ou&skipRounding=false";

				$("#indicator-div").load(base+dataUrl,function(data){
					applyDataTable();	
				});
			}

			function applyDataTable(){
				$('.listTable').DataTable({
					"pageLength": 25,
					"ordering": true,
					"columnDefs": [
						{targets:"_all", render:$.fn.dataTable.render.number('', '.', 0, '')}
					]
				});
				
				$("#loading-popup").hide();
			}
		});
	</script>
</body>
