<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Disease Burden Monitoring</title>  
	 
    <link rel="manifest" href="./manifest.webapp">
    <link href="./css/bootstrap.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
    <link href="./css/toastify.min.css" rel="stylesheet">
</head>
<body>
    <header id="header" class="header custom-header py-2 bg-primary"></header>
    <nav id="nav" class="py-1 bg-light border-bottom nav"></nav>    
    <main>
        <div class="home">
            <div class="container">
                <div class="row pt-4">
                   <div class="col-lg-12" style="border-bottom:2px solid #efefef">
                     <h5>Disease Burden (OPD Morbidity)</h5>
                   </div>
                 </div>
                 
                <div class="row py-4">
                    <div class="col-lg-4">
                        <div class="card selection-box">
                            <div class="card-body">
                                <div class="row mb-1 ">
                                    <label for="input" class="col-sm-3 col-form-label">OU</label>
                                    <div class="col-sm-9">
                                        <select class="form-select"
                                            aria-label="Floating label select example" name="organisationUnit" id="organisationUnit"></select>
                                    </div>
                                </div>
                                                                
                                <div class="row mb-1 ">
                                    <label for="input" class="col-sm-3 col-form-label">Period</label>
                                    <div class="col-sm-9">    
                                        <select class="form-select" aria-label="Floating label select example" name="period" id="period">
                      										<option value="THIS_MONTH">This Month</option>
                      										<option value="LAST_MONTH">Last Month</option>
                      										<option value="LAST_3_MONTHS">Last 3 Months</option>
                      										<option value="LAST_6_MONTHS">Last 6 Months</option>
                      										<option value="LAST_12_MONTHS">Last 12 Months</option>
                      										<option value="MONTHS_THIS_YEAR">Months This Year</option>
                      										<option value="THIS_FINANCIAL_YEAR">This Fiscal Year</option>
                      										<option value="LAST_FINANCIAL_YEAR">Last Fiscal Year</option>
                      										<option value="LAST_5_FINANCIAL_YEARS">Last 5 Fiscal Years</option>
                      									</select>
                                    </div>
                                </div>
                                
                                <div class="row mb-1 ">
                                    <label for="input" class="col-sm-3 col-form-label">&nbsp;</label>
                                    <div class="col-sm-9">    
                                        <button class="btn btn-info text-white" id="apply" style="width:100%">Apply</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-8" id="indicator-div">
                        
                    </div>
                </div>
            </div>
        </div>

    </main>
    <div class="loading-popup" id="loading-popup" style="display:none;">
        <div class="loader-content-holder">
            <div class="loader-circulara"></div>
            <div class="loader-mask"></div>
            <div class="loader-mask"></div>
        </div>
    </div>

	<script src="./vendor/bootstrap.min.js"></script>
	<script src="./vendor/jquery-v1.js"></script>
	<script src="./vendor/toastify.js"></script>
	<script src="./vendor/jquery-block-ui.js"></script>
	<script src="./lib/config.js"></script>
	<script src="./lib/nav-script.js"></script>

	<link href="https://code.jquery.com/ui/1.10.4/themes/ui-lightness/jquery-ui.css" rel="stylesheet">  
	<link href="https://cdn.datatables.net/1.13.1/css/jquery.dataTables.min.css" rel="stylesheet">

	<script type="text/javascript">
		$(document).ready(function(){        
			var base = "https://hmis.gov.np/"; //hmisrest/dhpbridge.php?action=";
			var basePlain = "https://hmis.gov.np/"; //hmisrest/dhpbridge.php?type=plain&livedata=";
			var dataElements = [];
			var dataElementNames = [];

			$.getJSON("/hmis/api/me.json?fields=id,name,displayName,organisationUnits[id,name]", function(userOus){
				$.each(userOus.organisationUnits, function(i, ou){
					var ouOptions = "<option value='"+ou.id+"'>"+ou.name+"</option>";
					$("#organisationUnit").append(ouOptions);
				});
			});

			$("#indicator-div").html("<h5>&laquo; Select options and click apply button</h5>");
			
			$(".optionSelect").change(function(){
				var id = $(this).attr("id");
				console.log(id);
				var program = $("#program").val();
				var url = "";
				
				// Get the data elements by program
				var url = "hmis/api/dataElementGroups/"+program+".json?fields=dataElements[id,name]";
				$.getJSON(base+url, function(result){
					dataElements = [];
					dataElementNames = [];
					$.each(result.dataElements, function(i, de){
						dataElements.push(de.id);
						dataElementNames.push(de.id+"_"+de.name);
					});

					if(id == "program"){
						var optionHtml = "";
						$.each(dataElementNames, function(i, de){
							optionHtml += "<option value='"+de.split("_")[0]+"' title='"+de.split("_")[1]+"'>"+de.split("_")[1]+"</option>";
						});
						$("#dataItems2").html(optionHtml);
					}
					
					if($("#type").val() != "monitoring"){
						$("#dataElementList").hide();
					}else{
						$("#dataElementList").show();
					}

				});
			});
			
			$("#apply").click(function(){
				$("#indicator-div").show().html("Loading...");
				var period = $("#period").val();
				var ou = $("#organisationUnit").val();
				loadDiseaseBurdenTable(period,ou);
			});
