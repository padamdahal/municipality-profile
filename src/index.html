<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHIS Dashboard</title>

    <link rel="manifest" href="./manifest.webapp">
    <link rel="stylesheet" href="./css/leaflet.css" />
    <link rel="stylesheet" href="./css/icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  	<link rel="stylesheet" href="./css/custom-dashboard.css" media="all">
    <link rel="stylesheet" type="text/css" href="./css/print.min.css" media="print">
    <link href="./css/style.css" rel="stylesheet">
</head>
<body>
    <header class="header custom-header py-2">
    </header>
    <nav class="py-1 bg-light border-bottom nav">
    </nav>
    <div class="wrapper">
        <header class="p-3">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-lg-3 position-relative">
                        <a href="#" class="stretched-link"></a>
                        <div class="business-brand d-flex align-items-center gap-3">
                            <!-- <img src="img/logo.png" alt="" class="logo-img"> -->
                            <div class="busines-name">
                                <h1 class="fs-6 d-flex flex-column fw-bold gap-1 text-custom-primary"
                                    id="municipality-name">
                                    <!-- Nilkantha Municipality -->
                                    <!-- <span class="fs-6 fw-normal text-uppercase">Dhading</span> -->
                                </h1>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-5">

                    </div>
                    <div class="col-lg-4">
                            <select id="organization-unit-select" class="col-lg-8">
                                <option value="">Select Organization</option>
                            </select>
                            <select id="fiscal-year-select" class="col-lg-3">
                                <option value="">Select Fiscal Year</option>
                            </select>
                    </div>
                </div>
            </div>
        </header>
        <div class="main-content">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-lg-8 ">
                        <div class="box shadow bg-white mb-3 ">
                            <div class="h-header p-2 border-bottom text-custom-primary fw-bold fs-6"><i
                                    class="bi-people"></i> Information </div>
                            <div class="box-body">                            
                                <div class="row">
                                    <div class="col-lg-5">
                                        <div class="desc-content">
                                            <p class="text-justify" id="municipality-info">
                                            </p>
                                        </div>
                                    </div>
                                    <div class="col-lg-7">
                                        <div id="map"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-4">
                        <div class="box shadow bg-white mb-3">
                            <div class="h-header p-2 border-bottom text-custom-primary fw-bold fs-6"><i
                                    class="bi-people"></i> Key Demographics </div>
                            <div class="box-body">
                                <ul class="table-view mb-0 d-flex flex-column" id="key-demographic-div">
                                    <div class="clearfix"></div>
                                </ul>
                            </div>
                        </div>

                        <div class="box shadow bg-white mb-3">
                            <div class="h-header p-2 border-bottom text-custom-primary fw-bold fs-6"><i
                                    class="bi-hospital"></i> Total Health Facilities </div>
                            <div class="box-body">
                                <ul class="table-view mb-0 d-flex flex-column" id="health-facility-div">
                                    <div class="clearfix"></div>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-lg-6 mb-3">
                        <div class="box shadow bg-white">
                            <div class="h-header p-2 border-bottom text-custom-primary fw-bold fs-6"><i
                                    class="bi-people"></i> Population Distribution by Caste
                                <!-- <span class="fs-7 fw-normal">(Male /
                                    Female)</span>  -->
                            </div>
                            <div class="box-body">
                                <label></label>
                                <div id="castewise"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <div class="box shadow bg-white mb-3">
                            <div class="h-header p-2 border-bottom text-custom-primary fw-bold fs-6">
                                <i class="bi-virus"></i> Active Health Insures
                            </div>
                            <div class="box-body">
                                <label>Insured HouseHolds : <span id="insureHousehold-data"></span></label>
                                <div id="insures"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-lg-12">
                        <div class="box shadow bg-white mb-3">
                            <div class="h-header p-2 border-bottom text-custom-primary fw-bold fs-6"><i
                                    class="bi-people"></i> Population Distribution by Age and Sex </div>
                            <div class="box-body">
                                <div id="populationByGender"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <div class="box shadow bg-white mb-3">
                            <div class="h-header p-2 border-bottom text-custom-primary fw-bold fs-6"><i
                                    class="bi-people"></i> Population Distribution by Ward
                                <!-- <span class="fs-7 fw-normal">(Male /
                                    Female)</span>  -->
                            </div>
                            <div class="box-body">
                                <div id="chartgenderward"></div>
                            </div>
                        </div>
                    </div>
                </div>               
                <div class="box shadow bg-white mb-3">
                    <div class="h-header p-2 border-bottom text-custom-primary fw-bold fs-6"><i class="bi-virus"></i>
                        Top Ten Diseases</span> 
                    </div>
                    <div class="col-md-5 col-lg-5 offset-md-5 offset-lg-5">
                        <select id="disease-select" class="disease-custom-select">
                            <option value="1">Diseases in number</option>
                            <option value="2">Diseases in percentage</option>
                        </select> 
                    </div>
                  
                    <div class="box-body">
                        <div class="row" id="topdisease-row">
                            <div class="col-lg-12">
                                <div id="topdisease"></div>
                            </div>
                        </div>
                    
                        <div class="row" id="topdiseasePercentage-row" style="display:none">
                            <div class="col-lg-12">
                                <div id="topdiseasePercentage" style="min-height: 450px;"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="col-lg-12">
                    <div class="box shadow bg-white mb-3">
                        <div class="h-header p-2 border-bottom text-custom-primary fw-bold fs-6"><i class="bi-hospital"></i> Health Facilities by Ward </div>
                        <div class="box-body">                        
                            <table class="table table-striped" id="ward-health-facility-div">                            
                            </table>
                        </div>
                    </div>
                </div>

                <div class="box shadow bg-white mb-3">
                    <div class="h-header p-2 border-bottom text-custom-primary fw-bold fs-6"><i class="bi-virus"></i>
                        Social Beneficiaries</span> </div>
                    <div class="box-body">
                        <div class="row">
                            <div id="socialbenificers"></div>                            
                        </div>
                    </div>
                </div>
                <!-- <div class="box shadow bg-white mb-3">
                    <div class="h-header p-2 border-bottom text-custom-primary fw-bold fs-6"><i
                        class="bi-bar-chart-fill"></i> GoN Priority Program Indicators</span> 
                    </div>
                    <div class="box-body">
                        <div id="indicator-div"></div>
                    </div>
                </div> -->
                <div class="row" id="indicator-trendline">
                </div>                
            </div>
        </div>
        <footer class="d-none">
            <div class="container-fluid">
                <div class="box shadow p-3 mb-3 bg-white">
                    <div class="row">
                        <div class="col-md-2">
                            <img src="img/giz-logo.gif" alt="">
                        </div>
                        <div class="col-md-10">
                            <div class="d-flex h-100 align-items-center ps-3">
                                <p class="disclaimer fs-7 mb-0">This profile is made possible...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <style>
        #populationByGender,
        #chartgenderward,
        #castewise,
        #insures,
        #wardwisepopulation,
        #topdisease,
        /* #household, */
        #socialbenificers,
        #map {
            width: 100%;
            height: 450px;
        }

        #map {
            height: 400px;
        }

        #map svg {
            background: rgba(219, 219, 219, .5);
        }
    </style>
    
    <script src="./vendor/popper.min.js"></script>
    <script src="./vendor/bootstrap.min.js"></script>
    <script src="./vendor/jquery-v1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  	<script src="./vendor/toastify.js"></script>
    <script src="./vendor/jquery-block-ui.js"></script>

    <script src="./lib/config.js"></script>
    <script src="./lib/nav-script.js"></script>
    <script src="./lib/dashboard-data.js"></script>
    <script src="./lib/dashboard-app.js"></script>

    <script src="./vendor/core.js"></script>
    <script src="./vendor/charts.js"></script>
    <script src="./vendor/animated.js"></script>

    <script src="./vendor/leaflet.js"></script>
    <script src="./vendor/topojson.min.js"></script>
    <script src="./vendor/leaflet.markercluster-src.js"></script>
    <script src="./vendor/map.js"></script>
</body>
</html>
